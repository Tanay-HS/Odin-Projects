<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>Welcome to rock paper scissor</header>
    <div class="score">
        <div class="humanScore">0</div>
        <div class="compScore">0</div>
    </div>
    <div class="content">
        <div class="human"></div>
        <div class="separation">v/s</div>
        <div class="comp"></div>
    </div>
    <div class="message"></div>
    <div class="buttons">
        <button value="rock">Rock</button>
        <button value="paper">Paper</button>
        <button value="scissor">Scissor</button>
    </div>
    <footer><button>end</button></footer>
</body>
<script src="script.js"></script>
</html>
