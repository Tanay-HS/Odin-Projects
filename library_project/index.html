<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>My Library</h1>
        <button id="new-book-btn">Add New Book</button>
    </header>
    <main>
        
    </main>
    <dialog id="book-dialog">
        <form id="book-form" method="dialog">
            <h2>Add New Book</h2>
            
            <label for="title">Title:</label>
            <input type="text" id="title" required placeholder="The Great Gatsby">

            <label for="author">Author:</label>
            <input type="text" id="author" required placeholder="F. Scott Fitzgerald">

            <label for="pages">Pages:</label>
            <input type="number" id="pages" required min="1" placeholder="180">

            <label class="checkbox-label">
                <input type="checkbox" id="readYet"> I have read this book
            </label>

            <div class="form-actions">
                <button type="button" id="cancel-btn">Cancel</button>
                <button type="submit" id="submit-btn">Add Book</button>
            </div>
        </form>
    </dialog>
</body>
<script src="script.js"></script>
</html>
